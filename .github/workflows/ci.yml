name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run unit tests
        env:
          QUICKBASE_RUN_INTEGRATION_TESTS: "0"
        run: python -m pytest tests -m "not integration"

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check src tests

      - name: Type check
        run: python -m mypy src tests

      - name: Test with coverage
        env:
          QUICKBASE_RUN_INTEGRATION_TESTS: "0"
        run: python -m pytest tests --cov=quickbase_structure_client --cov-report=term-missing -m "not integration"
